<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'unsafe-inline' https://challenges.cloudflare.com; style-src 'unsafe-inline'; frame-src https://challenges.cloudflare.com about:; connect-src https://challenges.cloudflare.com; img-src data:; base-uri 'none'; form-action 'none'; frame-ancestors 'none'"
    >
    <title>İşlem güvenlik kontrolü</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        align-items: center;
        background: #fff;
        color: #20242a;
        display: flex;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        padding: 12px;
      }

      main {
        max-width: 360px;
        text-align: center;
        width: 100%;
      }

      #turnstile {
        min-height: 65px;
      }

      #status {
        color: #68737d;
        font-size: 13px;
        font-weight: 700;
        line-height: 1.4;
        margin: 10px 0 0;
      }

      .error {
        color: #a23f3f;
      }
    </style>
  </head>
  <body>
    <main>
      <div id="turnstile"></div>
      <p id="status">Güvenlik kontrolü hazırlanıyor...</p>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const sitekey = params.get("sitekey") || "";
      const language = params.get("lang") === "en" ? "en" : "tr";
      const status = document.getElementById("status");
      const copy = {
        tr: {
          loading: "Güvenlik kontrolü hazırlanıyor...",
          ready: "Kontrol tamamlanıyor...",
          error: "Kontrol yüklenemedi. Lütfen tekrar dene."
        },
        en: {
          loading: "Preparing security check...",
          ready: "Completing verification...",
          error: "The security check could not load. Please try again."
        }
      };

      document.documentElement.lang = language;
      status.textContent = copy[language].loading;

      function postToApp(type, payload = {}) {
        const message = JSON.stringify({ type, ...payload });
        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage(message);
        }
      }

      function showError() {
        status.classList.add("error");
        status.textContent = copy[language].error;
        postToApp("turnstile-error");
      }

      window.renderTurnstile = function renderTurnstile() {
        if (!sitekey || !window.turnstile) {
          showError();
          return;
        }

        window.turnstile.render("#turnstile", {
          sitekey,
          language,
          theme: "light",
          size: "flexible",
          appearance: "interaction-only",
          callback(token) {
            status.textContent = copy[language].ready;
            postToApp("turnstile-token", { token });
          },
          "error-callback": showError,
          "expired-callback"() {
            postToApp("turnstile-expired");
            window.turnstile.reset();
          }
        });
        postToApp("turnstile-ready");
      };

      const script = document.createElement("script");
      script.src = "https://challenges.cloudflare.com/turnstile/v0/api.js?onload=renderTurnstile&render=explicit";
      script.async = true;
      script.defer = true;
      script.onerror = showError;
      document.head.appendChild(script);
    </script>
  </body>
</html>
